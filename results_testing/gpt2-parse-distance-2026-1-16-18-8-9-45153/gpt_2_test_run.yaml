dataset:
  observation_fieldnames:
     - index
     - sentence
     - lemma_sentence
     - upos_sentence
     - xpos_sentence
     - morph
     - head_indices
     - governance_relations
     - secondary_relations
     - extra_info
     - embeddings
  corpus:
    root: ../data/
    train_path: en_ewt-ud-train_cleaned.conllu
    dev_path: en_ewt-ud-dev_cleaned.conllu
    test_path: en_ewt-ud-test_cleaned.conllu
  embeddings:
    type: subword #{token,subword}
    root: ../embeddings/
    train_path: gpt2_train_embeddings.hdf5
    dev_path: gpt2_dev_embeddings.hdf5
    test_path: gpt2_test_embeddings.hdf5
  batch_size: 20
model:
  hidden_dim: 768 # GPT-2 small
  model_type: gpt2
  use_disk: True
  model_layer: 1 # 8 # fuck it we ball
probe:
  task_signature: word_pair # word, word_pair
  task_name: parse-distance
  maximum_rank: 768
  psd_parameters: True
  diagonal: False
  params_path: predictor.params
probe_training:
  epochs: 40
  loss: L1
reporting:
  root: ./results_testing
  observation_paths:
    train_path: train.observations
    dev_path: dev.observations
    test_path: test.observations
  prediction_paths:
    train_path: train.predictions
    dev_path: dev.predictions
    test_path: test.predictions
  reporting_methods:
    - spearmanr
    - image_examples
    # - root_acc
    - uuas
